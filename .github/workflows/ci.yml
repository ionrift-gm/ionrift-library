name: CI — Lint & Static Analysis

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'

  workflow_dispatch:

# ionrift-library does NOT receive repository_dispatch — it IS the library.
# It triggers fan-out to consumers after all checks pass.

jobs:

  lint:
    uses: ionrift-gm/ionrift-ci/.github/workflows/lint.yml@main
    with:
      # Library scans scripts/ + styles/ (CSS). No lang/ directory.
      include_html: false
      include_styles: true
      inclusion_scan_dirs: 'scripts/ styles/'
      # Vendor exclusion — library ships a bundled vendor copy.
      eslint_extra_args: "--ignore-pattern 'scripts/vendor/**'"
      eslint_max_warnings: 50
      # signal_check.js is optional in library (guard in place upstream).
      signal_check_required: false

  hygiene:
    uses: ionrift-gm/ionrift-ci/.github/workflows/hygiene.yml@main

  module-manifest:
    uses: ionrift-gm/ionrift-ci/.github/workflows/module-manifest.yml@main

  vitest:
    uses: ionrift-gm/ionrift-ci/.github/workflows/vitest.yml@main
    with:
      # Committed package.json has no 'test' script — invoke vitest directly.
      vitest_command: 'npx vitest run --config tests/vitest.config.js'

  # ─────────────────────────────────────────────────────────────────────────────
  # Fan-out — trigger consumer CIs after all library checks pass.
  # Gated on every check; any failure blocks propagation.
  # ─────────────────────────────────────────────────────────────────────────────
  fan-out:
    name: Trigger Consumer CIs
    runs-on: ubuntu-latest
    needs: [lint, hygiene, module-manifest, vitest]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ionrift-respite CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-respite
          event-type: lib-updated

      - name: Trigger ionrift-workshop CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-workshop
          event-type: lib-updated

      - name: Trigger ionrift-arbiter CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-arbiter
          event-type: lib-updated

      - name: Trigger ionrift-resonance CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-resonance
          event-type: lib-updated
