name: CI - Lint & Static Analysis

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'

  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 - ESLint
  # ---------------------------------------------------------------------------
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: npm install --no-save eslint@8

      - name: Run ESLint
        env:
          ESLINT_USE_FLAT_CONFIG: 'false'
        run: |
          npx eslint scripts/ \
            --ext .js \
            --ignore-pattern 'scripts/vendor/**' \
            --config .eslintrc.json \
            --max-warnings 50

  # ---------------------------------------------------------------------------
  # JOB 2 - Inclusion Scan
  # ---------------------------------------------------------------------------
  inclusion-scan:
    name: Inclusion Terminology Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for prohibited terms
        run: |
          MATCHES=$(grep -rn --include='*.js' --include='*.css' \
            -E '\b(Male|Female|Sex|Gender)\b' scripts/ styles/ 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "Prohibited identity terminology detected:"
            echo "$MATCHES"
            echo ""
            echo "Use: Masculine / Feminine / Identity"
            exit 1
          fi
          echo "Inclusion scan passed."

  # ---------------------------------------------------------------------------
  # JOB 3 - Import Integrity Check
  # ---------------------------------------------------------------------------
  import-integrity:
    name: Import Integrity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check relative imports resolve
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const ROOT = path.resolve('scripts');
          const importRe = /(?:import|from)\s+['"](\.[^'"]+)['"]/g;
          let failed = false;

          function sourceWithoutLineComments(src) {
            return src
              .split('\n')
              .filter((line) => !/^\s*\/\//.test(line))
              .join('\n');
          }

          function collectImports(src) {
            const out = [];
            let m;
            importRe.lastIndex = 0;
            while ((m = importRe.exec(src)) !== null) out.push(m[1]);
            return out;
          }

          function check(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                check(full);
                continue;
              }
              if (!entry.name.endsWith('.js')) continue;
              const src = sourceWithoutLineComments(
                fs.readFileSync(full, 'utf8')
              );
              for (const imp of collectImports(src)) {
                const resolved = path.resolve(path.dirname(full), imp);
                const candidates = [resolved, resolved + '.js'];
                if (!candidates.some((c) => fs.existsSync(c))) {
                  console.error(
                    'Broken import in ' + path.relative(ROOT, full) + ': ' + imp
                  );
                  failed = true;
                }
              }
            }
          }

          if (!fs.existsSync(ROOT)) {
            console.error('scripts/ missing');
            process.exit(1);
          }
          check(ROOT);
          if (failed) process.exit(1);
          console.log('Import integrity passed.');
          NODE

  # ---------------------------------------------------------------------------
  # JOB 4 - Case-Sensitivity Check
  # ---------------------------------------------------------------------------
  case-sensitivity:
    name: Case-Sensitivity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build lowercase file manifest and check imports
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const ROOT = path.resolve('scripts');
          const importRe = /(?:import|from)\s+['"](\.[^'"]+)['"]/g;
          let failed = false;

          function sourceWithoutLineComments(src) {
            return src
              .split('\n')
              .filter((line) => !/^\s*\/\//.test(line))
              .join('\n');
          }

          const manifest = new Map();
          function index(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                index(full);
                continue;
              }
              manifest.set(full.toLowerCase(), full);
            }
          }

          function collectImports(src) {
            const out = [];
            let m;
            importRe.lastIndex = 0;
            while ((m = importRe.exec(src)) !== null) out.push(m[1]);
            return out;
          }

          function check(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                check(full);
                continue;
              }
              if (!entry.name.endsWith('.js')) continue;
              const src = sourceWithoutLineComments(
                fs.readFileSync(full, 'utf8')
              );
              for (const imp of collectImports(src)) {
                let resolved = path.resolve(path.dirname(full), imp);
                if (!resolved.endsWith('.js')) resolved += '.js';
                const real = manifest.get(resolved.toLowerCase());
                if (real && real !== resolved) {
                  console.error(
                    'Case mismatch in ' +
                      path.relative(ROOT, full) +
                      ': imported as ' +
                      imp +
                      ' but real path is ' +
                      path.relative(ROOT, real)
                  );
                  failed = true;
                }
              }
            }
          }

          if (!fs.existsSync(ROOT)) {
            console.error('scripts/ missing');
            process.exit(1);
          }
          index(ROOT);
          check(ROOT);
          if (failed) process.exit(1);
          console.log('Case-sensitivity check passed.');
          NODE

  # ---------------------------------------------------------------------------
  # JOB 5 - Signal Check
  # ---------------------------------------------------------------------------
  signal-check:
    name: Signal Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run signal check
        run: |
          if [[ -f tools/signal_check.js ]]; then
            node tools/signal_check.js scripts/
          else
            echo "No tools/signal_check.js; skipping signal check."
          fi

  # ---------------------------------------------------------------------------
  # JOB 6 - Artifact Hygiene Gate
  # ---------------------------------------------------------------------------
  artifact-hygiene:
    name: Artifact Hygiene Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dev document sweep
        run: |
          MATCHES=$(git ls-files | grep -iE 'BACKLOG|DESIGN|CHECKLIST|CONTENT_GUIDE|scenarios/' || true)
          if [ -n "$MATCHES" ]; then
            echo "Dev documents found in tracked files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "Dev document sweep passed."

      - name: Dev tooling sweep
        run: |
          MATCHES=$(git ls-files | grep -iE 'scripts/tests/|scripts/utils/|dev-link|compendiumBuilder' || true)
          if [ -n "$MATCHES" ]; then
            echo "Dev tooling found in tracked files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "Dev tooling sweep passed."

      - name: LevelDB runtime sweep
        run: |
          MATCHES=$(git ls-files | grep -iE 'packs/.*\.(LOCK|LOG|LOG\.old|log)$' || true)
          if [ -n "$MATCHES" ]; then
            echo "LevelDB runtime files found in tracked files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "LevelDB sweep passed."

  # ---------------------------------------------------------------------------
  # JOB 7 - Module manifest (no Vitest in this package yet)
  # ---------------------------------------------------------------------------
  module-manifest:
    name: Module Manifest Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module.json
        run: |
          node <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('module.json', 'utf8');
          let data;
          try {
            data = JSON.parse(raw);
          } catch (e) {
            console.error('Invalid module.json:', e.message);
            process.exit(1);
          }
          for (const key of ['id', 'title', 'version']) {
            if (!data[key] || typeof data[key] !== 'string') {
              console.error('Missing or invalid string field:', key);
              process.exit(1);
            }
          }
          console.log('Module manifest OK.');
          NODE

  # ---------------------------------------------------------------------------
  # JOB 8 - Unit Tests (Vitest)
  # Headless creature classifier tests. No Foundry runtime required.
  # ---------------------------------------------------------------------------
  vitest:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  fan-out:
    name: Trigger Consumer CIs
    runs-on: ubuntu-latest
    needs: [eslint, inclusion-scan, import-integrity, case-sensitivity, artifact-hygiene, vitest]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ionrift-respite CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-respite
          event-type: lib-updated

      - name: Trigger ionrift-workshop CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-workshop
          event-type: lib-updated

      - name: Trigger ionrift-arbiter CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-arbiter
          event-type: lib-updated

      - name: Trigger ionrift-resonance CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IONRIFT_CI_PAT }}
          repository: ionrift-gm/ionrift-resonance
          event-type: lib-updated
